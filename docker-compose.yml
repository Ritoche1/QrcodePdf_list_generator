version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrcodepdf-backend
    restart: unless-stopped
    volumes:
      - qrcodepdf-data:/data
    environment:
      - DATA_DIR=/data
      - DATABASE_URL=sqlite+aiosqlite:///data/qrcodepdf.db
      - DEMO_MODE=true
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qrcodepdf-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  qrcodepdf-data:
    driver: local
